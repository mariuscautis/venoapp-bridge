name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:

  # ─── Linux AppImage (Tauri) ────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libdbus-1-dev \
            libglib2.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json

      - name: Install npm dependencies
        run: npm install

      - name: Build Linux AppImage
        run: npm run tauri build -- --bundles appimage --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          CARGO_TERM_COLOR: always

      - name: Rename artifact
        run: |
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" \
            -exec cp {} venoapp-bridge.AppImage \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: venoapp-bridge.AppImage

  # ─── Windows installer (Electron) ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('bridge-electron/package.json','utf8'));
            p.version = '$VERSION';
            fs.writeFileSync('bridge-electron/package.json', JSON.stringify(p, null, 2));
          "

      - name: Copy server.js and icon into bridge-electron
        shell: bash
        run: |
          cp bridge-node/server.js bridge-electron/server.js
          cp src-tauri/icons/128x128@2x.png bridge-electron/icon.png

      - name: Install dependencies
        working-directory: bridge-electron
        run: npm install

      - name: Build Windows installer
        working-directory: bridge-electron
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/venoapp-bridge-windows-setup.exe
          if-no-files-found: error

  # ─── Create GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: VenoApp Bridge ${{ github.ref_name }}
          body: |
            ## VenoApp Bridge ${{ github.ref_name }}

            ### Install on your venue device

            | Platform | Download |
            |----------|----------|
            | Windows PC | `venoapp-bridge-windows-setup.exe` |
            | Linux PC / Raspberry Pi | `venoapp-bridge.AppImage` |

            **Windows:** Run the installer. If SmartScreen appears, click "More info" → "Run anyway".
            VenoApp Bridge opens automatically and sits in the system tray.

            **Linux / Raspberry Pi:** Download the AppImage, make it executable (`chmod +x`), then run it.
          files: |
            venoapp-bridge-windows-setup.exe
            venoapp-bridge.AppImage
          draft: false
          prerelease: false

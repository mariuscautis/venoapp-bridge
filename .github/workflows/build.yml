name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:

  # ─── Linux AppImage ────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libdbus-1-dev \
            libglib2.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json

      - name: Install npm dependencies
        run: npm install

      - name: Build Linux AppImage
        run: npm run tauri build -- --bundles appimage --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          CARGO_TERM_COLOR: always

      - name: Rename artifact
        run: |
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" \
            -exec cp {} venoapp-bridge.AppImage \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: venoapp-bridge.AppImage

  # ─── Windows NSIS installer ───────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json

      - name: Install npm dependencies
        run: npm install

      - name: Build Windows
        run: npm run tauri build -- --bundles nsis,msi --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          CARGO_TERM_COLOR: always

      - name: Copy artifacts
        shell: bash
        run: |
          find src-tauri/target/release/bundle/nsis -name "*.exe" \
            -exec cp {} venoapp-bridge-setup.exe \; 2>/dev/null || true
          cp src-tauri/target/release/venoapp-bridge.exe venoapp-bridge-portable.exe 2>/dev/null || true

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: venoapp-bridge-setup.exe

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: venoapp-bridge-portable.exe

  # ─── Create GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: windows-portable

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: VenoApp Bridge ${{ github.ref_name }}
          body: |
            ## VenoApp Bridge ${{ github.ref_name }}

            ### Install on your venue device

            | Platform | Download |
            |----------|----------|
            | Windows (installer) | `venoapp-bridge-setup.exe` |
            | Windows (portable, no install) | `venoapp-bridge-portable.exe` |
            | Linux PC / Raspberry Pi | `venoapp-bridge.AppImage` |

            **Windows installer:** Run setup.exe, click "More info" → "Run anyway" if SmartScreen appears.
            **Windows portable:** Just double-click — no installation needed. Use this if the installer doesn't work.
            **Linux / Raspberry Pi:** Download the AppImage, make it executable (`chmod +x`), then run it.

            After first launch, enter your restaurant code and printer IP. The app runs silently in the background from then on.
          files: |
            venoapp-bridge-setup.exe
            venoapp-bridge-portable.exe
            venoapp-bridge.AppImage
          draft: false
          prerelease: false

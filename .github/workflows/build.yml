name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:

  # ─── Linux AppImage ────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libdbus-1-dev \
            libglib2.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json

      - name: Install npm dependencies
        run: npm install

      - name: Build Linux AppImage
        run: npm run tauri build -- --bundles appimage --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          CARGO_TERM_COLOR: always

      - name: Rename artifact
        run: |
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" \
            -exec cp {} venoapp-bridge.AppImage \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: venoapp-bridge.AppImage

  # ─── Windows exe (Node.js, no WebView2 required) ─────────────────────────
  build-windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies and build Windows exe
        run: |
          cd bridge-node
          npm install
          npx pkg server.js --targets node18-win-x64 --output ../venoapp-bridge-windows.exe --compress GZip --public-packages "*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: venoapp-bridge-windows.exe
          if-no-files-found: error

  # ─── Create GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: VenoApp Bridge ${{ github.ref_name }}
          body: |
            ## VenoApp Bridge ${{ github.ref_name }}

            ### Install on your venue device

            | Platform | Download |
            |----------|----------|
            | Windows PC | `venoapp-bridge-windows.exe` |
            | Linux PC / Raspberry Pi | `venoapp-bridge.AppImage` |

            **Windows:** Download and double-click `venoapp-bridge-windows.exe`. No installation required — no WebView2 needed.
            Your browser will open automatically at `http://localhost:3355` for setup.
            Keep the terminal window open (or add it to Windows startup via Task Scheduler).

            **Linux / Raspberry Pi:** Download the AppImage, make it executable (`chmod +x`), then run it.
          files: |
            venoapp-bridge-windows.exe
            venoapp-bridge.AppImage
          draft: false
          prerelease: false
